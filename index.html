<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Sky Jumper</title>

  <!-- GOOGLE ANALYTICS -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T55L3XFXTM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T55L3XFXTM');
  </script>

  <script>
    const androidUrl = "https://play.google.com/store/apps/details?id=com.hantro.skyjumper";
    const iosUrl = "https://apps.apple.com/tr/app/hantro-sky-jumper/id6760672780?l=tr";
    const fallbackUrl = androidUrl;

    function detectAndRedirect() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      if (/android/i.test(ua)) {
        gtag('event', 'redirect', { platform: 'android' });
        window.location.replace(androidUrl);
        return;
      }

      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        gtag('event', 'redirect', { platform: 'ios' });
        window.location.replace(iosUrl);
        return;
      }

      gtag('event', 'redirect', { platform: 'unknown' });
      window.location.replace(fallbackUrl);
    }

    window.onload = () => {
      setTimeout(detectAndRedirect, 300);
    };
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #111;
      color: white;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      max-width: 320px;
      margin: 12px auto;
      padding: 14px 18px;
      text-decoration: none;
      border-radius: 12px;
      background: #2b2b2b;
      color: white;
      font-weight: bold;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #3a3a3a;
    }

    .btn img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <h1>Sky Jumper</h1>
  <p>Yönlendiriliyorsun... Açılmazsa aşağıdan seç.</p>

  <a class="btn" href="https://play.google.com/store/apps/details?id=com.hantro.skyjumper"
     onclick="gtag('event','click_android')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" alt="Google Play Logo">
    <span>Google Play Store</span>
  </a>

  <a class="btn" href="https://apps.apple.com/tr/app/hantro-sky-jumper/id6760672780?l=tr"
     onclick="gtag('event','click_ios')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="App Store Logo">
    <span>App Store</span>
  </a>
</body>
</html>
